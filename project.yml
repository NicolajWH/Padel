name: Padel
options:
  bundleIdPrefix: com.worsa
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
    CODE_SIGN_STYLE: Automatic

packages:
  PadelKit:
    path: Packages/PadelKit

targets:
  PadelApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS/PadelApp
      - path: iOS/Shared
    dependencies:
      - package: PadelKit
      - target: PadelWatch
        embed: true
      - target: PadelWidgets
        embed: true
    entitlements:
      path: Generated/PadelApp.entitlements
      properties:
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.worsa.padel
    info:
      path: Generated/iOS-Info.plist
      properties:
        CFBundleDisplayName: Padel
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleLocalizations: [en, da]
        NSLocationWhenInUseUsageDescription: "Padel uses your location to find shared matches and players on nearby courts."
        # Required in the companion app because the embedded Watch app uses HealthKit.
        NSHealthShareUsageDescription: "Padel reads your heart rate and active energy to show live workout stats while you play."
        NSHealthUpdateUsageDescription: "Padel saves your padel matches as workouts in Health, including heart rate and calories."
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64]
        NSHumanReadableCopyright: "© 2026 Padel"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worsa.padel
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PadelWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp/PadelWatch
    dependencies:
      - package: PadelKit
    entitlements:
      path: Generated/PadelWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: Generated/watchOS-Info.plist
      properties:
        CFBundleDisplayName: Padel
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleLocalizations: [en, da]
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.worsa.padel
        WKRunsIndependentlyOfCompanionApp: true
        WKBackgroundModes: [workout-processing]
        NSHealthShareUsageDescription: "Padel reads your heart rate and active energy to show live workout stats while you play."
        NSHealthUpdateUsageDescription: "Padel saves your padel matches as workouts in Health, including heart rate and calories."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSHumanReadableCopyright: "© 2026 Padel"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worsa.padel.watchapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PadelWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS/PadelWidgets
      - path: iOS/Shared
    info:
      path: Generated/PadelWidgets-Info.plist
      properties:
        CFBundleDisplayName: Padel Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleLocalizations: [en, da]
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worsa.padel.widgets
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES

schemes:
  PadelApp:
    build:
      targets:
        PadelApp: all
        PadelWatch: all
    run:
      config: Debug
    archive:
      config: Release
  PadelWatch:
    build:
      targets:
        PadelWatch: all
    run:
      config: Debug
    archive:
      config: Release
