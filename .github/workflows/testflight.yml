name: Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: testflight-deploy
  cancel-in-progress: false

jobs:
  test-padel-kit:
    name: Test PadelKit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Run PadelKit unit tests
        working-directory: Packages/PadelKit
        run: swift test

  deploy:
    name: Build & Upload to TestFlight
    needs: test-padel-kit
    runs-on: macos-15
    timeout-minutes: 60
    # match stores the signing certificate + profiles on this repo's
    # "certificates" branch, so the job needs write access to push there.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Render Apple emoji app icons
        run: scripts/render-apple-emoji-app-icons.swift

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and upload to TestFlight
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bundle exec fastlane beta
